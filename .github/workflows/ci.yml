name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ────────────────────────────────────────────────
  # Job 1 : Backend — build, tests, couverture
  # ────────────────────────────────────────────────
  build-and-test:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: chrono_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: chrono_backend/package-lock.json

      - name: Install dependencies
        working-directory: ./chrono_backend
        run: npm ci

      - name: Build TypeScript
        working-directory: ./chrono_backend
        run: npm run build

      - name: Run tests with coverage
        working-directory: ./chrono_backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/chrono_test
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/chrono_test
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long-for-testing
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          LOG_LEVEL: error
        run: npm run test:ci

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: chrono_backend/coverage/
          retention-days: 7

  # ────────────────────────────────────────────────
  # Job 2 : Sécurité backend (audit obligatoire)
  # ────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: chrono_backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./chrono_backend
        run: npm ci

      - name: npm audit backend (échoue sur high/critical)
        working-directory: ./chrono_backend
        run: npm audit --audit-level=high

      - name: TruffleHog — détection de secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ────────────────────────────────────────────────
  # Job 3 : TypeScript backend
  # ────────────────────────────────────────────────
  lint-and-type-check:
    name: Backend — Lint & TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: chrono_backend/package-lock.json

      - name: Install dependencies
        working-directory: ./chrono_backend
        run: npm ci

      - name: TypeScript type check
        working-directory: ./chrono_backend
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────
  # Job 4 : Admin (Next.js) — lint + tsc + build stricts
  # ────────────────────────────────────────────────
  admin-build:
    name: Admin — Lint, TypeScript & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: admin_chrono/package-lock.json

      - name: Install dependencies
        working-directory: ./admin_chrono
        run: npm ci

      - name: Lint
        working-directory: ./admin_chrono
        run: npm run lint

      - name: TypeScript type check
        working-directory: ./admin_chrono
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./admin_chrono
        run: npm run build

      - name: npm audit admin (informationnel — jsPDF et xlsx sans fix disponible)
        working-directory: ./admin_chrono
        run: npm audit --audit-level=critical || true

  # ────────────────────────────────────────────────
  # Job 5 : Apps Expo — lint obligatoire
  # ────────────────────────────────────────────────
  expo-lint:
    name: Expo — Lint (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [app_chrono, driver_chrono]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.project }}
        run: npm ci

      - name: Lint
        working-directory: ./${{ matrix.project }}
        run: npm run lint
